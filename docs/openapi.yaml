openapi: 3.0.0
info:
  title: Cycle Count API
  version: 1.0.0
  description: Bulk create item-driven cycle count tasks

paths:
  /cc_item_task/bulk_create:
    post:
      summary: Create cycle count tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    item_id_list:
                      type: array
                      items:
                        type: integer
      responses:
        '200':
          description: Success
